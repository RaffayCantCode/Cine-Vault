<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4B5694"/>
      <stop offset="50%" stop-color="#7288AE"/>
      <stop offset="100%" stop-color="#EAE0CF"/>
    </linearGradient>
    <filter id="sg">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#7288AE" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Nested Icon Badge -->
  <g filter="url(#sg)">
    <rect x="12" y="12" width="56" height="56" rx="16" fill="#0d1233" stroke="url(#lg)" stroke-width="1.5" opacity="0.6"/>
    <!-- Swirling Stream Waves -->
    <path d="M25 40c0-8.3 6.7-15 15-15 4.1 0 7.9 1.7 10.6 4.4" stroke="url(#lg)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M55 40c0 8.3-6.7 15-15 15-4.1 0-7.9-1.7-10.6-4.4" stroke="url(#lg)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Nested Play Button -->
    <polygon points="35,32 49,40 35,48" fill="url(#lg)" stroke="url(#lg)" stroke-width="1.5" stroke-linejoin="round" />
  </g>

  <!-- Typography -->
  <text x="84" y="50" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="900" fill="#EAE0CF" letter-spacing="1.5">CINE</text>
  <text x="172" y="50" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="900" fill="url(#lg)" letter-spacing="1.5">STREAM</text>
  
  <line x1="84" y1="60" x2="325" y2="60" stroke="url(#lg)" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
</svg>
