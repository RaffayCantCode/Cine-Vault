<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="csGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4B5694"/>
      <stop offset="50%" stop-color="#7288AE"/>
      <stop offset="100%" stop-color="#EAE0CF"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#7288AE" flood-opacity="0.45"/>
    </filter>
  </defs>
  <!-- Background Badge -->
  <rect width="64" height="64" rx="18" fill="#0d1233" />
  <rect x="1.5" y="1.5" width="61" height="61" rx="16.5" stroke="url(#csGrad)" stroke-width="1.5" opacity="0.35"/>
  
  <g filter="url(#glow)">
    <!-- Swirling Stream Waves -->
    <path d="M15 32c0-9.4 7.6-17 17-17 4.7 0 9 1.9 12 5" stroke="url(#csGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M49 32c0 9.4-7.6 17-17 17-4.7 0-9-1.9-12-5" stroke="url(#csGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    
    <!-- Nested Play Button -->
    <polygon points="26,23 42,32 26,41" fill="url(#csGrad)" stroke="url(#csGrad)" stroke-width="2" stroke-linejoin="round" />
  </g>
</svg>
